# Please refer https://aka.ms/HTTPSinContainer on how to setup an https developer certificate for your ASP.NET Core service.

version: "3.4"

services:
    waydwebapi:
        container_name: wayd.web.api
        image: waydwebapi
        build:
            context: .
            dockerfile: Wayd.Web/src/Wayd.Web.Api/Dockerfile
        ports:
            - 5000:80
            - 5001:443
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=https://+:443;http://+:80
            - CorsSettings__WebClient=http://localhost:5002
            - Serilog__Using__1=Serilog.Sinks.Seq
            - Serilog__WriteTo__1__Name=Seq
            - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
        volumes:
            - ~/.vsdbg:/remote_debugger:rw
            - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
            - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
    waydwebclient:
        container_name: wayd.web.client
        image: waydwebclient
        build:
            context: .
            dockerfile: Wayd.Web/src/wayd.web.reactclient/Dockerfile
        ports:
            - 5002:3000
        environment:
            - NEXT_PUBLIC_AZURE_AD_CLIENT_ID=${AAD_CLIENT_ID}
            - NEXT_PUBLIC_AZURE_AD_TENANT_ID=${AAD_TENANT_ID}
            - NEXT_PUBLIC_MICROSOFT_LOGON_AUTHORITY=${AAD_LOGON_AUTHORITY}
            - NEXT_PUBLIC_API_SCOPE=${API_SCOPE}
            - NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL}

    seq:
        image: datalust/seq
        ports:
            - 8081:80
            - 5341:5341
        environment:
            - ACCEPT_EULA=Y
        volumes:
            - ./.seq:/data
