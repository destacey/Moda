name: Publish MCP to npm

permissions:
    contents: write
    id-token: write

on:
    push:
        branches: [main]
        paths:
            - "Wayd.Web/src/Wayd.Mcp/CHANGELOG.md"
    workflow_dispatch:

jobs:
    publish:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Wayd.Web/src/Wayd.Mcp
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: "https://registry.npmjs.org"

            - name: Update npm to v11 for OIDC support
              run: npm install -g npm@11

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Publish
              run: npm publish --access public

            - name: Tag release
              working-directory: ${{ github.workspace }}
              run: |
                  VERSION=$(node -p "require('./Wayd.Web/src/Wayd.Mcp/package.json').version")
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "wayd-mcp-v${VERSION}"
                  git push origin "wayd-mcp-v${VERSION}"
