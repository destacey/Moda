name: Publish MCP to npm

permissions:
    contents: write
    id-token: write
    pull-requests: write

on:
    workflow_dispatch:
        inputs:
            bump_type:
                description: "Version bump type"
                required: true
                type: choice
                default: minor
                options:
                    - patch
                    - minor
                    - major
                    - premajor
                    - preminor
                    - prepatch
                    - prerelease
            preid:
                description: "Prerelease identifier (only used for pre* bump types)"
                required: false
                default: next

jobs:
    publish:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        defaults:
            run:
                working-directory: Moda.Web/src/Moda.Mcp
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"

            - run: npm install -g npm@latest

            - name: Install dependencies
              run: npm ci

            - name: Bump version
              id: version
              run: |
                  BUMP="${{ inputs.bump_type }}"
                  if [[ "$BUMP" == pre* ]]; then
                      npm version "$BUMP" --preid "${{ inputs.preid }}" --no-git-tag-version --no-package-lock
                  else
                      npm version "$BUMP" --no-git-tag-version --no-package-lock
                  fi
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  if [[ "$VERSION" == *"-"* ]]; then
                      echo "is_prerelease=true" >> $GITHUB_OUTPUT
                  else
                      echo "is_prerelease=false" >> $GITHUB_OUTPUT
                  fi

            - name: Build
              run: npm run build

            - name: Publish
              run: |
                  if [[ "${{ steps.version.outputs.is_prerelease }}" == "true" ]]; then
                      npm publish --access public --tag next
                  else
                      npm publish --access public
                  fi

            - name: Create version bump branch and PR
              if: steps.version.outputs.is_prerelease == 'false'
              working-directory: ${{ github.workspace }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  BRANCH="chore/mcp-v${VERSION}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "${BRANCH}"
                  git add Moda.Web/src/Moda.Mcp/package.json
                  git commit -m "chore(mcp): bump mcp package version to ${VERSION} [skip ci]"
                  git push origin "${BRANCH}"
                  git tag "mcp-v${VERSION}"
                  git push origin "mcp-v${VERSION}"
                  gh pr create \
                    --title "chore(mcp): bump mcp package version to ${VERSION}" \
                    --body "Automated version bump after publishing \`@modanpm/moda-mcp@${VERSION}\` to npm." \
                    --base main \
                    --head "${BRANCH}"
                  gh pr merge --auto --merge "${BRANCH}"
              env:
                  GH_TOKEN: ${{ github.token }}
