name: docker

on:
    workflow_dispatch:
    push:
        branches:
            - "main"
        tags:
            - "v*"
    pull_request:
        branches:
            - "main"

jobs:
    build-and-test-api:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
                working-directory: Wayd.Web/src/Wayd.Web.Api
        steps:
            - name: checkout
              uses: actions/checkout@v2

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: 10.0.x

            - name: Restore dependencies
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore

            - name: Test
              run: dotnet test --no-build --verbosity normal

    build-and-test-client:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
                working-directory: Wayd.Web/src/wayd.web.reactclient
        steps:
            - name: checkout
              uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: npm ci
              run: npm ci

            - name: npm run lint
              run: npm run lint

            - name: npm run build
              run: npm run build

            - name: npm run test:coverage
              run: npm run test:coverage

    build-and-push-image:
        runs-on: ubuntu-latest
        needs: [build-and-test-api, build-and-test-client]
        strategy:
            fail-fast: false
            matrix:
                include:
                    - dockerfile: ./Wayd.Web/src/Wayd.Web.Api/Dockerfile
                      image: awaldow/moda-api
                      contextDir: .
                    - dockerfile: ./Wayd.Web/src/wayd.web.reactclient/Dockerfile
                      image: awaldow/moda-client
                      contextDir: .
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v2

            - name: Log in to the Container registry
              uses: docker/login-action@v2
              with:
                  username: awaldow
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v4
              with:
                  images: ${{ matrix.image }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,format=long
                      type=ref,event=branch
                      type=ref,event=pr

            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                  context: ${{ matrix.contextDir }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    terraform:
        name: "Terraform"
        runs-on: ubuntu-latest
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        needs: [build-and-push-image]
        defaults:
            run:
                working-directory: .iac/wayd

        steps:
            - uses: actions/checkout@v3
              name: Checkout

            - uses: hashicorp/setup-terraform@v3
              name: Setup Terraform
              with:
                  terraform_version: "1.14.x"
                  cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

            - name: Terraform Init
              id: init
              run: |
                  terraform init
                  terraform workspace select -or-create wayd-dev
                  terraform workspace show

            - name: Terraform fmt
              id: fmt
              run: terraform fmt -check
              continue-on-error: true

            - name: Terraform Validate
              id: validate
              run: terraform validate -no-color

            - name: Terraform Apply
              id: apply
              run: terraform apply -auto-approve -var="docker_tag=sha-${{ github.sha }}" -var="sql_admin_pass=${{ secrets.SQL_ADMIN_PASSWORD }}" -var="aad_api_client_secret=${{ secrets.AAD_API_CLIENT_SECRET }}" -var="local_jwt_secret=${{ secrets.LOCAL_JWT_SECRET }}"

    deploy:
        name: "Deploy"
        runs-on: ubuntu-latest
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        needs: [terraform]
        steps:
            - uses: actions/checkout@v3
              name: Checkout

            - name: Terraform Output
              id: tfoutputs
              uses: dflook/terraform-output@v1
              with:
                  workspace: wayd-dev
                  path: .iac/wayd
              env:
                  TERRAFORM_CLOUD_TOKENS: app.terraform.io=${{ secrets.TF_API_TOKEN }}

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: 10.0.x

            - name: Restore dependencies
              run: dotnet restore

            - name: Install dotnet ef
              run: dotnet tool install --global dotnet-ef

            - name: Build for migrations
              run: dotnet build Wayd.Web/src/Wayd.Web.Api/Wayd.Web.Api.csproj

            - name: Run migrations
              run: |
                  dotnet ef database update --connection "${{ steps.tfoutputs.outputs.sql_server_connection_string }}" --startup-project Wayd.Web/src/Wayd.Web.Api/Wayd.Web.Api.csproj --project Wayd.Infrastructure/src/Wayd.Infrastructure.Migrators.MSSQL/Wayd.Infrastructure.Migrators.MSSQL.csproj
